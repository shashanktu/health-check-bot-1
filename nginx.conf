worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 8080;

        location / {
            proxy_pass http://127.0.0.1:8501;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
        }
    }
}
